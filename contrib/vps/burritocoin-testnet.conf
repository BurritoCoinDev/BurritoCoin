# BurritoCoin testnet node configuration
# /etc/burritocoin/burritocoin.conf
#
# Used during step 2 of the pre-launch sequence:
#   two-VPS testnet with manual peer connections.
#
# Generated by contrib/vps/setup.sh testnet

# ---------------------------------------------------------------------------
# RPC credentials (required)
# ---------------------------------------------------------------------------
rpcuser=__RPC_USER__
rpcpassword=__RPC_PASS__

rpcallowip=127.0.0.1
rpcbind=127.0.0.1
rpcport=19226

# ---------------------------------------------------------------------------
# Network — testnet
# ---------------------------------------------------------------------------
testnet=1
listen=1
port=19227

maxconnections=50

# Connect to your second VPS peer manually.
# DNS seeds don't exist yet, so you must add peers explicitly.
# Replace with the actual IP of your second testnet VPS.
# addnode=<vps2-ip>:19227

# ---------------------------------------------------------------------------
# Indexing (for the block explorer on testnet)
# ---------------------------------------------------------------------------
txindex=1
addressindex=1

# ---------------------------------------------------------------------------
# Mining (optional — for testnet you may want to mine on one node)
# ---------------------------------------------------------------------------
# Set this to a testnet address to enable generate/generatetoaddress via RPC.
# gen=1
# genproclimit=1

# ---------------------------------------------------------------------------
# Performance
# ---------------------------------------------------------------------------
dbcache=256

# ---------------------------------------------------------------------------
# Daemon / logging
# ---------------------------------------------------------------------------
daemon=1
server=1

# More verbose logging is useful during testnet.
debug=net
debug=mempool
