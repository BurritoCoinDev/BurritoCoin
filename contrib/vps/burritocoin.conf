# BurritoCoin mainnet node configuration
# /etc/burritocoin/burritocoin.conf
#
# Generated by contrib/vps/setup.sh — edit as needed.
# Restart the service after changes: systemctl restart burritocoind

# ---------------------------------------------------------------------------
# RPC credentials (required)
# ---------------------------------------------------------------------------
rpcuser=__RPC_USER__
rpcpassword=__RPC_PASS__

# Only accept RPC connections from localhost.
# To allow the block explorer on the same machine, 127.0.0.1 is sufficient.
rpcallowip=127.0.0.1
rpcbind=127.0.0.1
rpcport=9226

# ---------------------------------------------------------------------------
# Network
# ---------------------------------------------------------------------------
# Accept incoming P2P connections (required for a bootstrap/seed node).
listen=1
port=9227

# Maximum number of inbound + outbound peer connections.
maxconnections=125

# Manually add peer bootstrap nodes here until DNS seeds are live.
# Replace with real IPs once your VPS nodes are running.
# addnode=<vps1-ip>:9227
# addnode=<vps2-ip>:9227

# ---------------------------------------------------------------------------
# Indexing (required by the block explorer)
# ---------------------------------------------------------------------------
# Full transaction index — allows looking up any txid.
txindex=1

# Address index — enables balance/history lookups by address.
# Note: first sync will take longer with these enabled.
addressindex=1

# ---------------------------------------------------------------------------
# Performance
# ---------------------------------------------------------------------------
# Database cache size in MB. 512 MB is comfortable for a 4 GB RAM VPS.
dbcache=512

# ---------------------------------------------------------------------------
# Daemon / logging
# ---------------------------------------------------------------------------
daemon=1
server=1

# Log to the data directory rather than stdout.
# (journald captures stdout anyway when run under systemd.)
# debuglogfile=/var/lib/burritocoind/debug.log

# Reduce log verbosity for production. Remove or change to debug=1 if
# you need detailed output while testing.
debug=0
